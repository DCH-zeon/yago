# ╭──────────────────────────────────────────────────╮
# │ Development docker compose with hot-reload       │
# │╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌│
# │ To start the services, run: docker-compose up -d │
# │ To stop the services, run: docker-compose down   │
# ╰──────────────────────────────────────────────────╯

name: ${DOCKER_GROUP_NAME:-application}  # Name of Docker group services
services:
# ╔══════════════════════════════════════════════════╗
# ║                Database PostgreSQL               ║
# ╚══════════════════════════════════════════════════╝
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: ${DATABASE_CONTAINER_NAME:-db}
    environment:
      POSTGRES_USER: ${DATABASE_USER:-app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secret}
      POSTGRES_DB: ${DATABASE_NAME:-yago}
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    volumes:
      - ./devops/data/postgres:/var/lib/postgresql
      - ./devops/postgres:/docker-entrypoint-initdb.d
    networks:
      - yago_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-app}"]
      interval: ${HEALTH_CHECK_INTERVAL:-15s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
      retries: ${HEALTH_CHECK_RETRIES:-5}
      start_period: ${HEALTH_CHECK_START_PERIOD:-15s}

# ╔══════════════════════════════════════════════════╗
# ║              YAGO API Application                ║
# ╚══════════════════════════════════════════════════╝
  api:
    build:
      context: .
      dockerfile: devops/go/Dockerfile
      target: development  # Use the development stage
    container_name: ${APP_CONTAINER_NAME:-api}
    working_dir: /app
    environment:
      - DOCKER_ENV=true
      - SKIP_INTEGRATION_TESTS=true
      - CGO_ENABLED=1
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-9009}:${SERVER_PORT:-9009}"
    volumes:
      # Mount source code for hot-reload in development
      - ./api:/app
      - /app/tmp  # Exclude tmp directory
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yago_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SERVER_PORT:-9009}/health/live || exit 1"]
      interval: ${HEALTH_CHECK_INTERVAL:-10s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
      retries: ${HEALTH_CHECK_RETRIES:-5}
    restart: unless-stopped

# ╔══════════════════════════════════════════════════╗
# ║              YAGO ADMIN Application              ║
# ╚══════════════════════════════════════════════════╝
  admin:
    container_name: ${ADMIN_CONTAINER_NAME:-admin}
    build:
      context: .
      dockerfile: devops/php/v8_5/Dockerfile
    volumes:
      - ./admin:/var/www/admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9003:9003"
      - "9000:9000"
      - "5173:5173"
    networks:
      - yago_network

# ╔══════════════════════════════════════════════════╗
# ║                   Server NGINX                   ║
# ╚══════════════════════════════════════════════════╝
  nginx:
    container_name: ${NGINX_CONTAINER_NAME:-nginx}
    image: nginx:latest
    volumes:
      - ./devops/nginx/conf.d/:/etc/nginx/conf.d
      - ./devops/nginx/ssl/:/etc/nginx/ssl
      - ./devops/nginx/proxy_params:/etc/nginx/proxy_params
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./admin:/var/www/admin
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      admin:
        condition: service_started
      api:
        condition: service_started
    networks:
      - yago_network

# ╔══════════════════════════════════════════════════╗
# ║                  REDIS Cache                     ║
# ╚══════════════════════════════════════════════════╝
  redis:
    image: redis:8.6.1-alpine3.23
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    command:
      - redis-server
      - --databases 1
      - --save ""
      - --appendonly no
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - yago_network

# ╔══════════════════════════════════════════════════╗
# ║                    RabbitMQ                      ║
# ╚══════════════════════════════════════════════════╝
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: ${RABBITMQ_CONTAINER_NAME:-rabbitmq}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-yago}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    volumes:
      - ./devops/data/rabbitmq:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - yago_network

# ╔══════════════════════════════════════════════════╗
# ║                   CENTRIFUGO                     ║
# ╚══════════════════════════════════════════════════╝
  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: ${CENTRIFUGO_CONTAINER_NAME:-centrifugo}
    command: centrifugo -c config.json
    ports:
      - "${CENTRIFUGO_PORT:-8000}:8000"
    volumes:
      - ./devops/centrifugo/config.json:/centrifugo/config.json
    networks:
      - yago_network

# ╔══════════════════════════════════════════════════╗
# ║                   MINIO - S3                     ║
# ╚══════════════════════════════════════════════════╝
  minio:
    image: minio/minio:RELEASE.2023-01-31T02-24-19Z
    container_name: ${MINIO_CONTAINER_NAME:-minio}
    command: server /data --console-address ":9001"
    environment:
      - "MINIO_ROOT_USER=root"
      - "MINIO_ROOT_PASSWORD=tJusX1DMQ0w"
    volumes:
      - ./devops/data/minio:/data
    ports:
      - "${MINIO_MAIN_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - yago_network

networks:
  yago_network:
    driver: bridge

volumes:
  postgres_data:

