# ===========================================
# YAGO REST API - Production Configuration
# ===========================================
# 
# This file contains production-specific overrides
# 📋 For ALL configuration options see: config.yaml (base configuration)
# 🔧 Environment variables (.env) have highest priority and will override these values
#
# ===========================================

app:
  name: "YAGO API"
  environment: "production"
  debug: false                      # Disable debug mode in production

database:
  host: "postgres"
  port: 5432
  user: "yago"
  password: ""                      # REQUIRED: set via DATABASE_PASSWORD environment variable
  name: "yago"
  sslmode: "require"                # SSL required in production

jwt:
  ttlhours: 24

server:
  port: "9009"
  readtimeout: 10
  writetimeout: 10
  idletimeout: 120
  shutdowntimeout: 30
  maxheaderbytes: 1048576

logging:
  level: "info"

migrations:
  directory: "./migrations"
  timeout: 300                      # 5 minutes for production
  locktimeout: 15                   # 15 seconds lock timeout